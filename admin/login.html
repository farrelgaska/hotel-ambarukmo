<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Hotel Ambarukmo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="admin-login-container">
        <a href="../index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Kembali ke Portal
        </a>

        <div class="admin-card">
            <div class="admin-header">
                <img src="../assets/logoambarukmo.png" alt="Logo Ambarukmo" class="admin-logo">
                <h2>HOTEL AMBARUKMO</h2>
                <p>SISTEM MANAJEMEN INTERNAL (ADMINISTRATOR)</p>
            </div>

            <form id="loginForm" class="admin-form">
                <div class="form-group">
                    <label>USERNAME</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" required placeholder="admin">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>PASSWORD</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" required placeholder="admin123">
                    </div>
                </div>

                <button type="submit" class="btn-admin-submit">
                    MASUK SISTEM <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>

            <div class="admin-footer">
                <p>Demo Admin: <strong>admin / admin123</strong> | Staff: <strong>staff / staff123</strong></p>
                <p>Khusus Tamu? <a href="../guest/login/login.html" class="admin-link">Portal Guest</a></p>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
