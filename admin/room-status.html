<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Status | Hotel Ambarukmo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard-container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Management</h2>
            <p>HOTEL AMBARUKMO</p>
        </div>
        <div class="sidebar-action">
            <button class="btn-gold-full"><i class="fas fa-plus"></i> NEW BOOKING</button>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-th-large"></i> DASHBOARD</a></li>
            <li><a href="reservation.html"><i class="far fa-calendar-alt"></i> RESERVATIONS</a></li>
            <li class="active"><a href="room-status.html"><i class="fas fa-bed"></i> ROOM STATUS</a></li>
            <li><a href="staff.html"><i class="fas fa-user-friends"></i> STAFF DIRECTORY</a></li>
            <li><a href="financials.html"><i class="fas fa-wallet"></i> FINANCIALS</a></li>
            <li><a href="settings.html"><i class="fas fa-cog"></i> SETTINGS</a></li>
        </ul>
        <div class="sidebar-bottom">
            <a href="#" class="bottom-link"><i class="far fa-question-circle"></i> HELP CENTER</a>
            <a href="../login.html" class="bottom-link"><i class="fas fa-sign-out-alt"></i> LOGOUT</a>
            <div class="user-profile">
                <div class="avatar"><i class="far fa-user"></i></div>
                <div class="user-info">
                    <span class="name">Admin User</span>
                    <span class="role">MANAGER</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <header class="top-header">
            <div class="header-titles">
                <h1>Room Status</h1>
                <p>Monitor real-time room availability and housekeeping status.</p>
            </div>
        </header>

       <!-- FILTER & SEARCH SECTION -->
        <div class="filter-search-container" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 15px; flex-wrap: wrap;">
            <div class="filter-section" style="display: flex; gap: 10px;">
                <button class="btn-filter active" data-filter="all">All Rooms</button>
                <button class="btn-filter" data-filter="available">Available</button>
                <button class="btn-filter" data-filter="dirty">Dirty</button>
                <button class="btn-filter" data-filter="occupied">Occupied</button>
                <button class="btn-filter" data-filter="maintenance">Maintenance</button>
            </div>
            <div class="search-section">
                <!-- Search Box Keren -->
                <input type="text" id="searchRoom" class="search-box" placeholder="Search room no..." style="color: #fff !important; background: transparent !important; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border-color); outline: none;">
            </div>
        </div>

        <!-- ROOM GRID -->
        <div class="room-grid" id="roomGrid">
            <!-- Room Cards will be injected here by JS -->
        </div>
    </main>
</div>

<!-- MODAL UPDATE ROOM STATUS -->
<div id="modalRoomStatus" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Update Room <span id="displayRoomNumber" class="gold-text"></span></h3>
            <button class="close-modal-room"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="formRoomStatus">
                <input type="hidden" id="editRoomId">
                <div class="form-group">
                    <label>Current Room Type</label>
                    <input type="text" id="displayRoomType" disabled style="background: #222; color: #888;">
                </div>
                <div class="form-group">
                    <label>Change Status</label>
                    <select id="updateRoomStatus" style="width: 100%; padding: 10px; background: #111; border: 1px solid var(--border-color); color: white; border-radius: 4px; outline: none;" required>
                        <option value="available">Available</option>
                        <option value="dirty">Dirty / Cleaning</option>
                        <option value="occupied">Occupied</option>
                        <option value="maintenance">Maintenance</option>
                    </select>
                </div>
                <button type="submit" class="btn-gold-full" style="margin-top: 15px;">UPDATE STATUS</button>
            </form>
        </div>
    </div>
</div>

<!-- MODAL NEW BOOKING (GLOBAL) -->
<div id="modalNewBooking" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Create New Booking</h3>
            <button class="close-modal-booking" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="formNewBooking">
                <div class="form-group">
                    <label>Guest Name</label>
                    <input type="text" id="newGuestName" required placeholder="e.g. John Doe">
                </div>
                <div class="form-group">
                    <label>Check-in Date</label>
                    <input type="date" id="newCheckin" style="width: 100%; padding: 10px; background: #111; border: 1px solid var(--border-color); color: white; border-radius: 4px; outline: none; color-scheme: dark;" required>
                </div>
                <div class="form-group">
                    <label>Check-out Date</label>
                    <input type="date" id="newCheckout" style="width: 100%; padding: 10px; background: #111; border: 1px solid var(--border-color); color: white; border-radius: 4px; outline: none; color-scheme: dark;" required>
                </div>
                <div class="form-group">
                    <label>Room Type</label>
                    <select id="newRoomType" style="width: 100%; padding: 10px; background: #111; border: 1px solid var(--border-color); color: white; border-radius: 4px; outline: none;" required>
                        <option value="Deluxe King">Deluxe King</option>
                        <option value="Deluxe Twin">Deluxe Twin</option>
                        <option value="Executive Suite">Executive Suite</option>
                        <option value="Presidential Suite">Presidential Suite</option>
                    </select>
                </div>
                <button type="submit" class="btn-gold-full" style="margin-top: 15px;">CREATE BOOKING</button>
            </form>
        </div>
    </div>
</div>

<div class="transition-overlay"></div>
<script src="js/core.js"></script>
<script src="js/room-status.js"></script>
</body>
</html>
