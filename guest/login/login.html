<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Login | Hotel Ambarukmo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/auth-guest.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="../../assets/logoambarukmo.png" alt="Logo" class="auth-logo">
                <h2>PORTAL GUEST</h2>
                <p>Silakan masuk ke akun Anda untuk mengelola reservasi dan layanan kamar.</p>
            </div>

            <form id="formGuestLogin" class="auth-form">
                <div class="form-group">
                    <label>EMAIL / USERNAME</label>
                    <input type="text" id="loginUser" required placeholder="budi@example.com">
                </div>
                <div class="form-group">
                    <div class="label-wrapper">
                        <label>PASSWORD</label>
                        <a href="forgot.html" class="auth-link small-text">Lupa Password?</a>
                    </div>
                    <input type="password" id="loginPass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-auth-submit">MASUK KE PORTAL</button>
            </form>

            <div class="auth-footer">
                <p>Belum memiliki akun? <a href="register.html" class="auth-link">Daftar Sekarang</a></p>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../js/auth-guest.js"></script>
</body>
</html>
