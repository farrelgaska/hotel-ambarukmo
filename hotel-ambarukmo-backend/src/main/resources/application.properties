# ============================================================
# Hotel Ambarukmo Backend — application.properties
# FIX [C4]: Semua credentials pindah ke environment variable.
#           Default value hanya untuk development lokal.
# ============================================================

spring.application.name=ambarukmo-backend

# Server Configuration
server.port=${SERVER_PORT:8080}

# MySQL Database Configuration
# FIX [C4]: Password tidak lagi di-hardcode. Set SPRING_DATASOURCE_PASSWORD di environment.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hotel_ambarukmo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Rafi123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
# FIX: Set show-sql=false di production untuk performa
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT Configuration
# FIX [C4]: JWT secret WAJIB di-set via environment variable di production.
# Panjang minimal 64 karakter untuk keamanan HS256/HS512.
jwt.secret=${JWT_SECRET:HotelAmbarukmoSecretKeyForJWTTokenGeneration2026MustBeAtLeast256BitsLongAndSecure!!}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRY:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRY:604800000}

# CORS — Frontend URL (dipakai SecurityConfig)
# FIX [C3]: Set FRONTEND_URL ke URL production frontend Anda
frontend.url=${FRONTEND_URL:http://localhost:5500}

# ============================================================
# PETUNJUK SETUP ENVIRONMENT VARIABLE (Production):
#
# Linux/macOS (.env atau systemd):
#   export SPRING_DATASOURCE_PASSWORD=YourSecureDBPassword
#   export JWT_SECRET=YourSuperSecretJWTKeyMinimum64CharactersLongForSecurity
#   export FRONTEND_URL=https://your-hotel-frontend.com
#
# Windows (PowerShell):
#   $env:SPRING_DATASOURCE_PASSWORD="YourSecureDBPassword"
#
# Docker (docker-compose.yml):
#   environment:
#     SPRING_DATASOURCE_PASSWORD: YourSecureDBPassword
#     JWT_SECRET: YourSuperSecretJWTKey
# ============================================================