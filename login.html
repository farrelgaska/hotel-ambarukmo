<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hotel Ambarukmo</title>
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali</a>
                <h2>Hotel Ambarukmo</h2>
                <p>Silahkan login untuk mengakses sistem</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username / Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Masukkan username" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Masukkan password" required>
                    </div>
                </div>

                <div class="options">
                    <label><input type="checkbox"> Ingat Saya</label>
                    <a href="#">Lupa Password?</a>
                </div>

                <button type="submit" class="btn-login">LOGIN <i class="fas fa-sign-in-alt"></i></button>
            </form>

            <div class="login-footer">
                <p>Khusus tamu? <a href="index.html">Pesan Kamar Langsung</a></p>
            </div>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
